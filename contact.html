<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact — iTechz Solutions</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>

<!-- YOUR FULL CSS SAME -->
<style>
/* KEEPING EVERYTHING SAME */
</style>
</head>

<body>

<!-- EVERYTHING ABOVE SAME -->

<section class="contact-section">
  <div class="contact-inner">

    <!-- LEFT SIDE SAME (UNCHANGED) -->
    <!-- KEEP YOUR FULL LEFT SECTION HERE -->

    <!-- RIGHT — FORM -->
    <div class="form-card reveal">

      <!-- ✅ FORM START -->
      <form action="https://formspree.io/f/xeepljep" method="POST" id="contact-form">

        <div id="form-wrap">
          <div class="form-title">Send an Enquiry</div>
          <p class="form-sub">Fill out the form and Shubham will get back to you within a few hours to confirm your appointment.</p>

          <div class="form-row">
            <div class="form-group">
              <label for="fname">First Name *</label>
              <input type="text" id="fname" name="First Name" placeholder="Rahul" required/>
            </div>
            <div class="form-group">
              <label for="lname">Last Name</label>
              <input type="text" id="lname" name="Last Name" placeholder="Sharma"/>
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="Phone" placeholder="+91 XXXXX XXXXX" required/>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="Email" placeholder="you@example.com"/>
          </div>

          <div class="form-group">
            <label for="service">Service Required *</label>
            <select id="service" name="Service" required>
              <option value="">— Select a service —</option>
              <option>Laptop Repair</option>
              <option>Desktop Service</option>
              <option>Printer Repair</option>
              <option>Software / OS Installation</option>
              <option>Network & WiFi Setup</option>
              <option>CCTV Installation</option>
              <option>Annual Maintenance Contract</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="msg">Describe Your Issue *</label>
            <textarea id="msg" name="Message" required placeholder="Please describe the problem..."></textarea>
          </div>

          <!-- ✅ hidden fields -->
          <input type="hidden" name="_subject" value="New Enquiry - iTechz Solutions">
          <input type="hidden" name="_captcha" value="false">

          <!-- ✅ FIXED BUTTON -->
          <button type="submit" class="form-submit">Send Enquiry →</button>
        </div>

      </form>
      <!-- ✅ FORM END -->

      <!-- SUCCESS UI (UNCHANGED) -->
      <div class="form-success" id="form-success">
        <div class="form-success-icon">
          <svg viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h3>Enquiry Sent!</h3>
        <p>Thank you for reaching out. Shubham will contact you shortly.</p>
      </div>

    </div>

  </div>
</section>

<script src="shared.js"></script>

<script>
initPage('contact');

const form = document.getElementById('contact-form');

form.addEventListener('submit', async function(e) {
  e.preventDefault();

  const fname = document.getElementById('fname').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const service = document.getElementById('service').value;
  const msg = document.getElementById('msg').value.trim();

  if (!fname || !phone || !service || !msg) {
    alert('Please fill in all required fields marked with *');
    return;
  }

  const data = new FormData(form);

  const response = await fetch(form.action, {
    method: "POST",
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  if (response.ok) {
    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('form-success').style.display = 'block';
    form.reset();
  } else {
    alert("Something went wrong. Please try again.");
  }
});
</script>

</body>
</html>
