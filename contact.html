<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contact — iTechz Solutions</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>

<style>
/* (KEEPING YOUR SAME CSS — NO CHANGE) */
.page-hero{padding-top:68px;background:var(--navy)}
.page-hero-inner{max-width:1200px;margin:0 auto;padding:4rem 2rem 3.5rem}
.breadcrumb{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:rgba(255,255,255,.4);margin-bottom:1.2rem}
.breadcrumb a{color:rgba(255,255,255,.55);text-decoration:none}.breadcrumb a:hover{color:#fff}
.breadcrumb span{color:rgba(255,255,255,.25)}
.page-hero h1{font-size:clamp(2rem,4vw,3rem);color:#fff;font-weight:800;letter-spacing:-.5px;margin-bottom:.75rem}
.page-hero p{font-size:1rem;color:rgba(255,255,255,.55);max-width:560px;line-height:1.8}

.contact-section{padding:80px 2rem;background:var(--bg)}
.contact-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1.4fr;gap:4rem;align-items:start;}
@media(max-width:840px){.contact-inner{grid-template-columns:1fr}}

.form-card{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:2.4rem;box-shadow:var(--shadow)}
.form-title{font-size:1.2rem;font-weight:800;color:var(--navy);margin-bottom:.4rem}
.form-sub{font-size:.85rem;color:var(--gray);margin-bottom:2rem;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
.form-group input,.form-group select,.form-group textarea{
  padding:.7rem .95rem;border:1.5px solid var(--line2);border-radius:8px;
}
.form-submit{
  width:100%;padding:.95rem;background:var(--blue);color:#fff;
  border:none;border-radius:10px;font-weight:700;cursor:pointer;
}
.form-success{display:none;text-align:center;padding:2rem;}
</style>
</head>

<body>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1>Get In Touch</h1>
    <p>Fill the form below. We will contact you quickly.</p>
  </div>
</div>

<section class="contact-section">
  <div class="contact-inner">

    <!-- RIGHT — FORM -->
    <div class="form-card">

      <!-- FORM START -->
      <form action="https://formspree.io/f/xeepljep" method="POST" id="contact-form">

        <div id="form-wrap">
          <div class="form-title">Send an Enquiry</div>
          <p class="form-sub">Fill out the form and we will get back to you.</p>

          <div class="form-row">
            <div class="form-group">
              <label>First Name *</label>
              <input type="text" name="First Name" required placeholder="Rahul"/>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" name="Last Name" placeholder="Sharma"/>
            </div>
          </div>

          <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" name="Phone" required placeholder="+91 XXXXX XXXXX"/>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="Email" placeholder="you@example.com"/>
          </div>

          <div class="form-group">
            <label>Service Required *</label>
            <select name="Service" required>
              <option value="">— Select a service —</option>
              <option>Laptop Repair</option>
              <option>Desktop Service</option>
              <option>Printer Repair</option>
              <option>Software / OS Installation</option>
              <option>Network & WiFi Setup</option>
              <option>CCTV Installation</option>
              <option>Annual Maintenance Contract</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Describe Your Issue *</label>
            <textarea name="Message" required placeholder="Describe your problem..."></textarea>
          </div>

          <!-- hidden -->
          <input type="hidden" name="_subject" value="New Enquiry - iTechz Solutions">
          <input type="hidden" name="_captcha" value="false">

          <button type="submit" class="form-submit">Send Enquiry →</button>
        </div>

      </form>
      <!-- FORM END -->

      <!-- SUCCESS UI -->
      <div class="form-success" id="form-success">
        <h3>Enquiry Sent!</h3>
        <p>We will contact you shortly.</p>
      </div>

    </div>

  </div>
</section>

<script>
const form = document.getElementById('contact-form');

form.addEventListener('submit', async function(e) {
  e.preventDefault();

  const data = new FormData(form);

  const response = await fetch(form.action, {
    method: "POST",
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  if (response.ok) {
    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('form-success').style.display = 'block';
    form.reset();
  } else {
    alert("Something went wrong. Try again.");
  }
});
</script>

</body>
</html>
